services:
  - type: keyvalue
    name: gastou-lembrou-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: gastou-lembrou-web
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: /app/scripts/render-web.sh
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: USE_WHITENOISE
        value: "True"
      - key: USE_X_FORWARDED_PROTO
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: SECURE_HSTS_PRELOAD
        value: "False"
      - key: RUN_MIGRATIONS
        value: "1"
      - key: RUN_COLLECTSTATIC
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: gastou-lembrou-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: gastou-lembrou-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: gastou-lembrou-redis
          property: connectionString
      - key: CACHE_URL
        fromService:
          type: keyvalue
          name: gastou-lembrou-redis
          property: connectionString
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_USE_SSL
        value: "False"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: PROJECT_EMAIL_SITE_NAME
        value: Gastou, Lembrou!

  - type: worker
    name: gastou-lembrou-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: /app/scripts/render-worker.sh
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          type: web
          name: gastou-lembrou-web
          envVarKey: SECRET_KEY
      - key: USE_WHITENOISE
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: gastou-lembrou-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: gastou-lembrou-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: gastou-lembrou-redis
          property: connectionString
      - key: CACHE_URL
        fromService:
          type: keyvalue
          name: gastou-lembrou-redis
          property: connectionString
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_USE_SSL
        value: "False"
      - key: EMAIL_HOST_USER
        fromService:
          type: web
          name: gastou-lembrou-web
          envVarKey: EMAIL_HOST_USER
      - key: EMAIL_HOST_PASSWORD
        fromService:
          type: web
          name: gastou-lembrou-web
          envVarKey: EMAIL_HOST_PASSWORD
      - key: DEFAULT_FROM_EMAIL
        fromService:
          type: web
          name: gastou-lembrou-web
          envVarKey: DEFAULT_FROM_EMAIL
      - key: SUPPORT_EMAIL
        fromService:
          type: web
          name: gastou-lembrou-web
          envVarKey: SUPPORT_EMAIL
      - key: GEMINI_API_KEY
        fromService:
          type: web
          name: gastou-lembrou-web
          envVarKey: GEMINI_API_KEY
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: PROJECT_EMAIL_SITE_NAME
        value: Gastou, Lembrou!

  - type: worker
    name: gastou-lembrou-beat
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: /app/scripts/render-beat.sh
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          type: web
          name: gastou-lembrou-web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: gastou-lembrou-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: gastou-lembrou-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: gastou-lembrou-redis
          property: connectionString
      - key: CACHE_URL
        fromService:
          type: keyvalue
          name: gastou-lembrou-redis
          property: connectionString

databases:
  - name: gastou-lembrou-db
    databaseName: gastou_lembrou
    user: gastou_lembrou
    plan: basic-256mb
